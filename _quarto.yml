project:
  type: book
  output-dir: docs

website:
  reader-mode: true
  search:
    location: sidebar
    type: overlay
  comments:
    hypothesis:
      openSidebar: true
      theme: clean

execute: 
  freeze: auto

book:
  title: "Fitted Q-Iteration: Estimación de niveles de presas"
  author:
    - name: "Erika Rubí Jiménez Guzmán"
      affiliations:
        - name: "Universidad Autónoma Chiapas"
    
    - name: "Asesor: Dr. Yofre Hernán García Gómez"
      affiliations:
        - name: "Universidad Autónoma de Chiapas"
  language: es
  date: today
  image: Imagenes\fcfm.png
  favicon: Imagenes\fcfm.png
  downloads: [pdf, epub]

  sidebar:
    logo: Imagenes\logos.jpeg
    style: floating
    collapse-level: 2
    border: true
    search: true

  repo-url: https://github.com/RubiJimenez929/Tesis-Licenciatura
  page-navigation: true 

  chapters:
    - index.qmd
    - intro.qmd

    - part: "Preliminares"
      chapters:
        - Inteligencia artificial.qmd
        - Q-Learning.qmd
      
    - part: "Modelo Matemático"
      chapters:
        - Modelo_Matematico.qmd


    - conclusiones.qmd
    - futuros_trabajos.qmd
    - references.qmd

  comments:
    hypothesis: true 

bibliography: references.bib

format:
  html:
    theme:
      light: flatly
      dark: darkly
    highlight-style: a11y
    toc: true
    toc-location: right
    code-fold: true
    code-copy: true

  pdf:
    documentclass: scrreprt
    papersize: letter
    toc: true
    number-sections: true
    pdf-engine: lualatex

  epub:
    cover-image: Imagenes\fcfm.png


editor: visual